services:
  - type: web
    name: ranklore-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 180
    envVars:
      # Prefer Supabase Transaction pooler on Render (avoids IPv6 "Network is unreachable" on db.*.supabase.co).
      - key: DATABASE_POOLER_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FLASK_DEBUG
        value: "false"
      - key: PORT
        generateValue: "10000"
