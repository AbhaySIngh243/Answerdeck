services:
  - type: web
    name: ranklore-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 180
    envVars:
      # Prefer Supabase Transaction pooler on Render (avoids IPv6 "Network is unreachable" on db.*.supabase.co).
      - key: DATABASE_POOLER_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FLASK_DEBUG
        value: "false"
      - key: RANKLORE_SEARCH_PROVIDER
        value: "serper"
      - key: SERPER_API_KEY
        sync: false
      # Native web search inside each LLM (ChatGPT web_search tool, Gemini
      # google_search grounding, Claude web_search tool, Perplexity sonar) now
      # provides live grounding + citations, so the external Serper prompt
      # augmentation stays off and visibility measures raw model answers.
      - key: RANKLORE_SEARCH_AUGMENT_ENABLED
        value: "false"
      - key: CASHFREE_PLAN_CURRENCY
        value: "INR"
      - key: CASHFREE_PLAN_STANDARD_AMOUNT
        value: "7599"
      - key: CASHFREE_PLAN_PRO_AMOUNT
        value: "14299"
      # Demo request emails (Resend → hello@answrdeck.com)
      - key: DEMO_REQUEST_TO_EMAIL
        value: "hello@answrdeck.com"
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: "Answrdeck <onboarding@resend.dev>"
